name: Pages

# Builds the landing page (apps/web) and deploys it to GitHub Pages. Enable Pages
# for the repo with "Source: GitHub Actions" (Settings → Pages) for this to work.
on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'packages/core/src/branding.ts'
      - 'package.json'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let an in-flight one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install web dependencies
        working-directory: apps/web
        run: bun install
      - name: Build the site
        working-directory: apps/web
        run: bun run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
