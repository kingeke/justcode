name: Release

# Builds a self-contained JustCode binary for each platform on its own native
# runner (no cross-compilation: @opentui's native library is platform-gated),
# then publishes them as GitHub Release assets. Runs only when dispatched (the
# Version workflow dispatches it on the new tag); it is intentionally not on a
# tag push, so a tag alone never triggers a release.
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: darwin-arm64
            os: macos-14
          - target: linux-x64
            os: ubuntu-latest
          - target: linux-arm64
            os: ubuntu-24.04-arm
          - target: windows-x64
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # Installs the platform-specific @opentui native library for this runner.
      - run: bun install --frozen-lockfile
      - run: bun run build:binary
      - uses: actions/upload-artifact@v4
        with:
          name: justcode-${{ matrix.target }}
          path: dist-bin/justcode-*
          if-no-files-found: error

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/justcode-*
          fail_on_unmatched_files: true
          # Auto-build the "What's Changed" + "New Contributors" notes from the
          # merged PRs since the previous tag (same as GitHub's "Generate release
          # notes" button). Requires PRs to populate; direct pushes won't appear.
          generate_release_notes: true

  # Publishes the npm launcher package (users get the binary via the postinstall
  # download). Requires the NPM_TOKEN secret; the package (justcode-cli) is
  # public, and the command it installs is still `justcode` (the bin name).
  npm-publish:
    name: npm publish
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Builds the VS Code extension, attaches the .vsix to the GitHub Release (so it
  # can be sideloaded), and publishes to the marketplaces so VS Code auto-updates
  # installed copies. Packaging always runs; the two publish steps only fire when
  # their token secret is present, so a release never fails for want of a token:
  #   - VSCE_PAT  — VS Code Marketplace  (https://marketplace.visualstudio.com)
  #   - OVSX_PAT  — Open VSX             (Cursor / VSCodium / Windsurf)
  vscode-publish:
    name: publish extension
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    env:
      VSCE_PAT: ${{ secrets.VSCE_PAT }}
      OVSX_PAT: ${{ secrets.OVSX_PAT }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # Installs esbuild + the reusable packages the extension bundles from source.
      - run: bun install --frozen-lockfile
      - name: Build the extension bundle
        working-directory: apps/vscode
        run: node esbuild.mjs
      - name: Package the VSIX
        working-directory: apps/vscode
        run: bunx @vscode/vsce package --no-dependencies -o justcode.vsix
      - name: Attach the VSIX to the release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/vscode/justcode.vsix
      - name: Publish to the VS Code Marketplace
        if: ${{ env.VSCE_PAT != '' }}
        working-directory: apps/vscode
        run: bunx @vscode/vsce publish --no-dependencies -p "$VSCE_PAT"
      # The namespace must exist before publishing; `create-namespace` is a
      # one-time op, so ignore the "already exists" error on later releases.
      - name: Ensure the Open VSX namespace exists
        if: ${{ env.OVSX_PAT != '' }}
        working-directory: apps/vscode
        run: bunx ovsx create-namespace kingeke -p "$OVSX_PAT" || true
      - name: Publish to Open VSX
        if: ${{ env.OVSX_PAT != '' }}
        working-directory: apps/vscode
        run: bunx ovsx publish justcode.vsix -p "$OVSX_PAT"
