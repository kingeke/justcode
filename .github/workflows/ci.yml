name: CI

# Runs the test suite, type checker, and formatting check on every push and PR.
# The release workflow only builds binaries on tags, so this is the gate that
# actually catches broken tests and type errors before they land.
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: test & typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Format check
        run: bunx prettier --check .

      - name: Test
        run: bun run test
